<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Planner</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#191724',
            card: '#1f1d2e',
            cardHover: '#26233a',
            border: '#403d52',
            muted: '#6e6a86',
            text: '#e0def4',
            teal: '#31748f',
            rose: '#ebbcba',
            pine: '#286983',
            foam: '#9ccfd8',
            iris: '#c4a7e7',
          }
        }
      }
    }
  </script>

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #191724;
      color: #e0def4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #191724; }
    ::-webkit-scrollbar-thumb { background: #403d52; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #6e6a86; }

    .fade-in { animation: fadeIn 0.15s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }

    input:focus { outline: none; }
    button { cursor: pointer; border: none; background: none; color: inherit; }

    /* Inset title bar drag region */
    .drag-region {
      -webkit-app-region: drag;
      height: 28px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // ─── Inline all component files ──────────────────────────────────────────

    // We load them via script tags with type="text/babel"
  </script>

  <script type="text/babel" src="./components/SetupScreen.jsx"></script>
  <script type="text/babel" src="./components/CalendarTab.jsx"></script>
  <script type="text/babel" src="./components/TasksTab.jsx"></script>
  <script type="text/babel" src="./components/FocusTab.jsx"></script>
  <script type="text/babel" src="./components/MusicTab.jsx"></script>
  <script type="text/babel" src="./components/QuickAddModal.jsx"></script>
  <script type="text/babel" src="./App.jsx"></script>
</body>
</html>
