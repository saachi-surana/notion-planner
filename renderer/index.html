<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Planner</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1e1e1e',
            card: '#2a2a2a',
            cardHover: '#333333',
            border: '#3a3a3a',
            muted: '#888888',
            purple: '#7F77DD',
            teal: '#1D9E75',
            amber: '#BA7517',
          }
        }
      }
    }
  </script>

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1e1e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e1e1e; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }

    .fade-in { animation: fadeIn 0.15s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }

    input:focus { outline: none; }
    button { cursor: pointer; border: none; background: none; color: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // ─── Inline all component files ──────────────────────────────────────────

    // We load them via script tags with type="text/babel"
  </script>

  <script type="text/babel" src="./components/SetupScreen.jsx"></script>
  <script type="text/babel" src="./components/CalendarTab.jsx"></script>
  <script type="text/babel" src="./components/TasksTab.jsx"></script>
  <script type="text/babel" src="./components/FocusTab.jsx"></script>
  <script type="text/babel" src="./components/MusicTab.jsx"></script>
  <script type="text/babel" src="./components/QuickAddModal.jsx"></script>
  <script type="text/babel" src="./App.jsx"></script>
</body>
</html>
